version: "3.9"

# Local dev stack for the GH Archive pipeline.
# - Kestra + its Postgres backend (Module 2)
# - Kafka (KRaft, no Zookeeper) (Module 7)
# - Spark standalone master + worker (Module 6)
# Everything shares a single docker network so services can reach each other by name.

networks:
  gh:

volumes:
  kestra_data:
  kestra_pg:
  kafka_data:

services:

  # ---------------- Orchestration ----------------
  kestra-postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: kestra
    volumes:
      - kestra_pg:/var/lib/postgresql/data
    networks: [gh]
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kestra"]
      interval: 5s
      retries: 20

  kestra:
    image: kestra/kestra:latest
    depends_on:
      kestra-postgres:
        condition: service_healthy
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://kestra-postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: kestra
        kestra:
          server:
            basicAuth:
              enabled: false
          repository:
            type: postgres
          queue:
            type: postgres
          storage:
            type: local
            local:
              basePath: /app/storage
    ports:
      - "8080:8080"
    volumes:
      - kestra_data:/app/storage
      - ./orchestration/flows:/app/flows:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: server standalone
    networks: [gh]

  # ---------------- Streaming ----------------
  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      ALLOW_PLAINTEXT_LISTENER: "yes"
    ports:
      - "9094:9094"
    volumes:
      - kafka_data:/bitnami/kafka
    networks: [gh]

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on: [kafka]
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8081:8080"
    networks: [gh]

  # ---------------- Batch compute ----------------
  spark-master:
    image: bitnami/spark:3.5
    environment:
      SPARK_MODE: master
    ports:
      - "7077:7077"
      - "8090:8080"
    volumes:
      - ./processing/spark:/opt/jobs:ro
      - ./infra/terraform/sa-key.json:/opt/gcp-key.json:ro
    networks: [gh]

  spark-worker:
    image: bitnami/spark:3.5
    depends_on: [spark-master]
    environment:
      SPARK_MODE: worker
      SPARK_MASTER_URL: spark://spark-master:7077
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
    volumes:
      - ./processing/spark:/opt/jobs:ro
      - ./infra/terraform/sa-key.json:/opt/gcp-key.json:ro
    networks: [gh]
